version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: divergent_college_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: divergent_college
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: divergent_college_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend-api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: divergent_college_backend_api
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: development
      PORT: 5000
      CLIENT_URL: http://145.132.97.45:3000,http://145.132.97.45:3000,http://10.24.131.241:3000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/divergent_college
      REDIS_URL: redis://redis:6379
      JWT_SECRET: dev-secret-key-change-in-production
      JWT_EXPIRES_IN: 7d
      OLLAMA_BASE_URL: http://ollama:11434
      PUPPETEER_HEADLESS: 'true'
      PUPPETEER_TIMEOUT: 30000
    ports:
      - "5001:5000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend/src:/app/src
    command: npm run dev

  backend-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: divergent_college_backend_worker
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/divergent_college
      REDIS_URL: redis://redis:6379
      OLLAMA_BASE_URL: http://ollama:11434
      PUPPETEER_HEADLESS: 'true'
      PUPPETEER_TIMEOUT: 30000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend/src:/app/src
    command: npm run worker

  ollama:
    image: ollama/ollama:latest
    container_name: divergent_college_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
      - ./ollama/modelfiles:/modelfiles
      - ./ollama/models:/custom-models
      - ./ollama/base:/base-models
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://145.132.97.45:11434/api/version"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
  redis_data:
  ollama_data:
